
services:
  web:
    build: .
    image: odoo:17.0-fonts
    depends_on:
      - db
    ports:
      - "8069:8069"
    restart: always
    volumes:
      - ./addons:/mnt/extra-addons
      - ./enterprise:/mnt/v17
      - ./config:/etc/odoo
      - odoo-data:/var/lib/odoo
      - ./logs:/var/log/odoo
    environment:
      - HOST=db
      - USER=odoo
      - PASSWORD=odoo
    command: ["odoo", "-c", "/etc/odoo/odoo.conf"]

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  odoo-data:
  db-data:
